name: Version and release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-bump:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[automated]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto bump patch when workflow files change without VERSION
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_REF" ]; then
            export BASE_REF="HEAD~1"
            export HEAD_REF="HEAD"
          fi
          chmod +x scripts/ci-needs-version-bump.sh scripts/ci-auto-bump-commit.sh scripts/bump-version.sh scripts/sync-version.sh
          ./scripts/ci-auto-bump-commit.sh

  verify:
    needs: auto-bump
    # Skip verify on the same run that auto-bump pushed — the follow-up push run will verify.
    if: >-
      always() &&
      (github.event_name == 'pull_request' ||
       contains(github.event.head_commit.message, '[automated]') ||
       needs.auto-bump.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify version markers match VERSION
        run: |
          chmod +x scripts/sync-version.sh
          ./scripts/sync-version.sh --check
      - name: Require VERSION bump on pull requests (or bump before merge)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: HEAD
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          chmod +x scripts/ci-needs-version-bump.sh
          if ./scripts/ci-needs-version-bump.sh; then
            echo "::warning::Workflow files changed without VERSION bump. Merge to main will trigger an automated patch bump."
          fi

  release:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Read version
        id: ver
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release if tag missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          TAG="v${V}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skip"
            exit 0
          fi
          PREV="$(git tag -l 'v*' --sort=-v:refname | head -1 || true)"
          if [ -n "$PREV" ]; then
            NOTES="$(git log "${PREV}..HEAD" --pretty=format:'- %s (%h)' 2>/dev/null | head -50 || true)"
          else
            NOTES="Initial Helix release."
          fi
          gh release create "$TAG" \
            --title "Helix ${V}" \
            --notes "## Helix ${V}

${NOTES:-Skill and workflow updates.}

Install: \`curl -sL https://raw.githubusercontent.com/Thitic9203/helix/main/scripts/install.sh | bash\`"
