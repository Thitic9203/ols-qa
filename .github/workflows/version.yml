name: Version and release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version markers match VERSION
        run: ./scripts/sync-version.sh --check
      - name: Require VERSION bump when workflows change
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(skills/[^/]+/SKILL\.md|commands/[^/]+\.md|references/[^/]+\.md)$'; then
            if ! echo "$CHANGED" | grep -qx 'VERSION'; then
              echo "::error::Workflow files changed but VERSION was not bumped. Run: ./scripts/bump-version.sh patch"
              exit 1
            fi
          fi

  release:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read version
        id: ver
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release if tag missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          TAG="v${V}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skip"
            exit 0
          fi
          PREV="$(git tag -l 'v*' --sort=-v:refname | head -1 || true)"
          if [ -n "$PREV" ]; then
            NOTES="$(git log "${PREV}..HEAD" --pretty=format:'- %s (%h)' -- . ':!*.md' 2>/dev/null | head -50 || true)"
          else
            NOTES="Initial Helix release."
          fi
          gh release create "$TAG" \
            --title "Helix ${V}" \
            --notes "## Helix ${V}

${NOTES:-Skill and workflow updates.}

Install: \`curl -sL https://raw.githubusercontent.com/Thitic9203/helix/main/scripts/install.sh | bash\`"
