name: Version and release

# Fully automatic on push to main: bump (if needed) → verify → push → GitHub Release.
# No workflow_dispatch, no manual `gh release create`, no second CI run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify version markers match VERSION
        run: |
          set -o pipefail
          chmod +x scripts/sync-version.sh
          ./scripts/sync-version.sh --check
      - name: Check portable content in skills and commands
        run: |
          set -o pipefail
          chmod +x scripts/ci-check-portable-skills.sh
          ./scripts/ci-check-portable-skills.sh
      - name: Check skill structure (Pluton ship requirements)
        run: |
          set -o pipefail
          chmod +x scripts/ci-check-skill-structure.sh
          ./scripts/ci-check-skill-structure.sh
      - name: Warn if merge will trigger CI patch bump
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: HEAD
        run: |
          set -o pipefail
          git fetch origin "${{ github.base_ref }}"
          chmod +x scripts/ci-needs-version-bump.sh
          if ./scripts/ci-needs-version-bump.sh; then
            echo "::warning::Skill/command files changed without VERSION in this PR. CI will auto-bump patch on merge to main."
          fi

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto bump patch when required
        id: bump
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: HEAD
        run: |
          set -o pipefail
          if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_REF" ]; then
            export BASE_REF="HEAD~1"
          fi
          export HEAD_REF="HEAD"
          chmod +x scripts/ci-needs-version-bump.sh scripts/bump-version.sh scripts/sync-version.sh
          if ./scripts/ci-needs-version-bump.sh; then
            OLD="$(tr -d '[:space:]' < VERSION)"
            ./scripts/bump-version.sh patch
            NEW="$(tr -d '[:space:]' < VERSION)"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add VERSION .claude-plugin/plugin.json .claude-plugin/marketplace.json README.md
            git commit -m "chore(ci): bump version ${OLD} -> ${NEW} [automated]"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify version markers match VERSION
        run: |
          set -o pipefail
          ./scripts/sync-version.sh --check

      - name: Check portable content in skills and commands
        run: |
          set -o pipefail
          chmod +x scripts/ci-check-portable-skills.sh
          ./scripts/ci-check-portable-skills.sh

      - name: Check skill structure (Pluton ship requirements)
        run: |
          set -o pipefail
          chmod +x scripts/ci-check-skill-structure.sh
          ./scripts/ci-check-skill-structure.sh

      - name: Push version bump to main
        if: steps.bump.outputs.bumped == 'true'
        run: |
          set -o pipefail
          git push origin HEAD:main

      - name: Create GitHub Release if tag missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          git fetch --tags origin
          V="${{ steps.bump.outputs.version }}"
          TAG="v${V}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skip"
            exit 0
          fi
          PREV="$(git tag -l 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)"
          NOTES_FILE="$(mktemp)"
          {
            echo "## Helix ${V}"
            echo ""
            if [ -n "$PREV" ]; then
              git log "${PREV}..HEAD" --pretty=format:'- %s (%h)' 2>/dev/null | head -50 || true
            else
              echo "Skill and workflow updates."
            fi
            echo ""
            echo 'Install: `curl -sL https://raw.githubusercontent.com/Thitic9203/helix/main/scripts/install.sh | bash`'
          } > "$NOTES_FILE"
          gh release create "$TAG" \
            --title "Helix ${V}" \
            --notes-file "$NOTES_FILE"
          echo "Created release $TAG at https://github.com/Thitic9203/helix/releases/tag/${TAG}"
